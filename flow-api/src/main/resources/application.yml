server:
  port: 11281
  servlet:
    context-path: /flow
    encoding:
      charset: UTF-8
      enabled: true
      force: true
spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/flow?serverTimezone=Asia/Shanghai&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${SPRING_DATASOURCE_PASSWORD:Ssdz@699}
  redis:
    host: 127.0.0.1
    port: 6379
    password:
    database: 0

# yu-flow Unified Configuration
yu:
  flow:
    enabled: true
    enable-ui: true
    username: admin
    password: ${YU_FLOW_ADMIN_PASSWORD:flow@699}
    # Flow Engine Group
    engine:
      expression-engine: simple
      strict-mode: true
      enable-trace: false
    # Security Group
    security:
      aes-secret-key: ${YU_FLOW_AES_SECRET:flow-secure-keys}
